<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Obietnic Wyborczych 2023-2027</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="legend">
        <div class="legend-item"><span class="icon done">✓</span> Zrealizowane</div>
        <div class="legend-item"><span class="icon pending">•</span> W trakcie</div>
        <div class="legend-item"><span class="icon failed">✕</span> Niezrealizowane</div>
    </div>

    <header class="main-header">
        <div id="info-bar" class="info-bar">Ładowanie danych NBP...</div>
        <h1>Monitor Obietnic Wyborczych</h1>
        <p class="subtitle">Analiza realizacji programów partii parlamentarnych 2023-2027</p>
    </header>

    <main class="container">
        <div id="app" class="party-grid">
            <div class="loading">Inicjalizacja danych...</div>
        </div>
    </main>

    <footer style="text-align: center; padding: 20px; border-top: 1px solid #dee2e6; background: white; margin-top: 30px;">
        <p style="font-size: 0.9em; color: #666; margin: 0;">Strona ma charakter informacyjny. Ostatnia aktualizacja danych: 09.04.2026. Favicon: stylized chart.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>

</body>
</html>
