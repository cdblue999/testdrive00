<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src * data:;">
    <title>terminal obywatelski - monitorowanie obietnic wyborczych i wskaźników gospodarczych</title>
    <meta name="description" content="Terminal obywatelski - niezależny monitoring realizacji obietnic wyborczych partii politycznych w Polsce. Śledź wskaźniki gospodarcze, kursy walut NBP, ceny paliw i terminy wyborów w jednym miejscu.">
    <meta name="keywords" content="obietnice wyborcze, monitoring, partie polityczne, PiS, KO, Trzecia Droga, Lewica, Konfederacja, wskaźniki gospodarcze, NBP, kurs walut, Polska, demokracja, wybory">
    <meta name="robots" content="index, follow">
    <meta name="author" content="ZMS">
    <meta name="language" content="pl">
    <meta property="og:title" content="terminal obywatelski - monitoring obietnic wyborczych">
    <meta property="og:description" content="Niezależny monitoring realizacji obietnic wyborczych partii politycznych w Polsce. Dane: NBP, MF, GUS.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="pl_PL">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="terminal obywatelski - monitoring obietnic wyborczych">
    <meta name="twitter:description" content="Śledź realizację obietnic wyborczych partii politycznych, kursy walut i wskaźniki gospodarcze.">
    <link rel="canonical" href="https://github.com/cdblue999/testdrive00">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="news-ticker">
        <div class="ticker-wrapper" id="ticker-content">Inicjalizacja transmisji...</div>
    </div>

    <div id="currency-box" class="corner-box left-box">
        <div class="box-title">RYNEK I WSKAŹNIKI (LIVE)</div>
        <div id="rates" class="data-block">Pobieranie danych...</div>
    </div>

    <div class="corner-box right-box">
        <div class="box-title">Legenda wyborcza</div>
        <div id="legend-content" class="data-block"></div>
    </div>

    <header class="main-header">
        <h1>terminal obywatelski - stan na dziś: <span id="current-date"></span></h1>
        <div class="election-wrapper">
            <div class="election-title">WYBORY</div>
            <div id="election-data-box" class="data-block"></div>
        </div>
        <div class="lang-switch">
            <img src="https://flagcdn.com/w40/pl.png" class="lang-icon" onclick="setLanguage('pl')" alt="PL">
            <img src="https://flagcdn.com/w40/gb.png" class="lang-icon" onclick="setLanguage('en')" alt="EN">
            <img src="https://flagcdn.com/w40/de.png" class="lang-icon" onclick="setLanguage('de')" alt="DE">
        </div>
        <div class="flag-container"><div class="flag-white"></div><div class="flag-red"></div></div>
    </header>

    <main id="app" class="party-grid"><div style="grid-column:1/-1; text-align:center; padding:60px; font-family:var(--font-data); color:var(--text-muted);">Ładowanie danych...</div></main>

    <footer class="site-footer"><p id="t-footer"></p></footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
